# FileMaster Pro - Production Docker Compose Configuration
# Includes SSL/HTTPS setup with Let's Encrypt

version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: filemaster-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/filemaster.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-data:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
      - ../filemaster-web/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - filemaster-network
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot
    container_name: filemaster-certbot
    restart: unless-stopped
    volumes:
      - certbot-data:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - filemaster-network

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: filemaster-backend
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
      # Database
      - MYSQL_HOST=${MYSQL_HOST:-mysql}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DB=${MYSQL_DB:-filemaster}
      - MYSQL_USER=${MYSQL_USER:-filemaster}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      # Redis
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      # Alipay Configuration
      - ALIPAY_APP_ID=${ALIPAY_APP_ID}
      - ALIPAY_PRIVATE_KEY=${ALIPAY_PRIVATE_KEY}
      - ALIPAY_PUBLIC_KEY=${ALIPAY_PUBLIC_KEY}
      - ALIPAY_SERVER_URL=${ALIPAY_SERVER_URL:-https://openapi.alipay.com/gateway.do}
      - ALIPAY_NOTIFY_URL=${ALIPAY_NOTIFY_URL:-https://your-domain.com/api/payment/alipay/notify}
      - ALIPAY_RETURN_URL=${ALIPAY_RETURN_URL:-https://your-domain.com/payment/success}
      # WeChat Pay Configuration
      - WECHAT_MCH_ID=${WECHAT_MCH_ID}
      - WECHAT_APP_ID=${WECHAT_APP_ID}
      - WECHAT_API_V3_KEY=${WECHAT_API_V3_KEY}
      - WECHAT_MCH_SERIAL_NO=${WECHAT_MCH_SERIAL_NO}
      - WECHAT_PRIVATE_KEY_PATH=${WECHAT_PRIVATE_KEY_PATH:-/etc/filemaster/certs/apiclient_key.pem}
      - WECHAT_NOTIFY_URL=${WECHAT_NOTIFY_URL:-https://your-domain.com/api/payment/wechat/notify}
      # Storage
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - STORAGE_BASE_PATH=${STORAGE_BASE_PATH:-/data/filemaster/files}
    volumes:
      - ./certs:/etc/filemaster/certs:ro
      - filemaster-data:/data/filemaster/files
    depends_on:
      - mysql
      - redis
    networks:
      - filemaster-network

  mysql:
    image: mysql:8.0
    container_name: filemaster-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DB:-filemaster}
      - MYSQL_USER=${MYSQL_USER:-filemaster}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - filemaster-network
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: filemaster-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - filemaster-network

volumes:
  certbot-data:
  certbot-www:
  filemaster-data:
  mysql-data:
  redis-data:

networks:
  filemaster-network:
    driver: bridge
