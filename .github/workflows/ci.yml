name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./file-processor

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven

    - name: Run Tests
      run: mvn clean test -B

    - name: Generate Test Report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Backend Test Results
        path: file-processor/target/surefire-reports/*.xml
        reporter: java-junit

    - name: Upload Coverage
      uses: codecov/codecov-action@v4
      with:
        file: file-processor/target/site/jacoco/jacoco.xml
        flags: backend
        name: backend-coverage

  backend-build:
    name: Backend Build
    needs: backend-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./file-processor

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests -B

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: backend-jar
        path: file-processor/target/*.jar

    - name: Build Docker Image
      run: |
        docker build -t filemaster-backend:${{ github.sha }} .
        docker tag filemaster-backend:${{ github.sha }} filemaster-backend:latest

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./filemaster-web

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: filemaster-web/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Run Lint
      run: npm run lint || true

    - name: Run Tests
      run: npm run test || true

  frontend-build:
    name: Frontend Build
    needs: frontend-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./filemaster-web

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: filemaster-web/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Upload Build
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: filemaster-web/dist

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        projectBaseDir: file-processor

  deploy-staging:
    name: Deploy to Staging
    needs: [backend-build, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.filemaster.pro

    steps:
    - uses: actions/checkout@v4

    - name: Download Backend
      uses: actions/download-artifact@v4
      with:
        name: backend-jar
        path: deploy/

    - name: Download Frontend
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: deploy/dist

    - name: Deploy to Staging
      run: |
        echo "Deploying to staging environment..."
        # Add your deployment script here
        # scp, kubectl, or docker-compose deployment

  deploy-production:
    name: Deploy to Production
    needs: [backend-build, frontend-build, code-quality]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://filemaster.pro

    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4

    - name: Deploy to Production
      run: |
        echo "Deploying to production environment..."
        # Add production deployment script
